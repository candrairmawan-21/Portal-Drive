<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnorth Data Portal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;450;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
        }
        .skeleton {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .hover-lift {
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.35s ease, border-color 0.35s ease;
        }
        .hover-lift:hover {
            transform: translateY(-6px);
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 antialiased selection:bg-amber-500 selection:text-white overflow-hidden" id="mainBody">

    <!-- ================= LOGIN PAGE OVERLAY ================= -->
    <div id="loginOverlay" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[9999] p-4 transition-all duration-500">
        <div class="absolute top-12 left-1/4 w-72 h-72 bg-amber-500/10 rounded-full blur-3xl pointer-events-none"></div>
        <div class="absolute bottom-12 right-1/4 w-72 h-72 bg-amber-700/10 rounded-full blur-3xl pointer-events-none"></div>
        
        <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl border border-slate-100 p-8 relative overflow-hidden text-center transform scale-100 transition-transform duration-300">
            <div class="flex justify-center mb-5">
                <img src="midnorth java (1).png" alt="Logo" class="h-20 w-auto object-contain">
            </div>
            <h2 class="text-xl font-extrabold text-amber-950 tracking-tight">Midnorth <span class="text-amber-500">Data Portal</span></h2>
            <p class="text-slate-400 text-xs mt-1 font-medium">Silakan masukkan username Anda untuk mengakses portal hub.</p>
            
            <form id="loginForm" class="mt-8 text-left">
                <div class="mb-5">
                    <label for="usernameInput" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Username</label>
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="user" class="h-4 w-4 text-slate-400 group-focus-within:text-amber-600 transition-colors duration-200"></i>
                        </span>
                        <input type="text" id="usernameInput" required placeholder="Ketik username resmi Anda..." class="block w-full pl-11 pr-4 py-3 border border-slate-200 rounded-2xl bg-slate-50 placeholder-slate-400 focus:outline-none focus:bg-white focus:ring-4 focus:ring-amber-500/10 focus:border-amber-500 transition-all duration-200 font-medium text-sm text-slate-700">
                    </div>
                    <p id="loginError" class="text-rose-500 text-xs font-semibold mt-2 hidden flex items-center gap-1">
                        <i data-lucide="alert-circle" class="w-3.5 h-3.5"></i> Username tidak terdaftar atau salah!
                    </p>
                </div>
                
                <button type="submit" class="w-full flex justify-center items-center py-3.5 bg-slate-900 text-white text-sm font-bold rounded-2xl hover:bg-gradient-to-r hover:from-amber-500 hover:to-amber-600 shadow-md hover:shadow-xl hover:shadow-amber-500/20 transition-all duration-300 gap-2 hover-lift">
                    <i data-lucide="log-in" class="w-4 h-4"></i>
                    Masuk ke Portal
                </button>
            </form>
            <p class="text-[10px] text-slate-400 font-bold tracking-widest uppercase mt-8">Corporate Secured Hub</p>
        </div>
    </div>

    <!-- ================= MAIN WEB CONTENT ================= -->
    <div class="absolute top-0 left-1/4 w-96 h-96 bg-amber-500/5 rounded-full blur-3xl -z-20 pointer-events-none"></div>
    <div class="absolute top-40 right-1/4 w-96 h-96 bg-amber-700/5 rounded-full blur-3xl -z-20 pointer-events-none"></div>

    <header class="bg-white/70 backdrop-blur-xl shadow-[0_2px_20px_-5px_rgba(0,0,0,0.05)] sticky top-0 z-50 border-b border-slate-200/50">
        <div class="container mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="flex items-center justify-center transform hover:scale-105 transition-transform duration-300">
                    <img src="midnorth java (1).png" alt="Logo" class="h-16 w-auto object-contain">
                </div>
                <div class="h-10 w-[1px] bg-slate-200 hidden sm:block"></div>
                <div>
                    <h1 class="text-lg font-extrabold tracking-tight text-amber-950 leading-none">
                        Midnorth <span class="text-amber-500 font-black">Data Portal</span>
                    </h1>
                    <p class="text-[9px] text-slate-400 font-bold tracking-widest uppercase mt-1">Corporate File Hub</p>
                </div>
            </div>
            
            <div class="flex items-center w-full md:w-auto gap-4">
                <div class="relative w-full md:w-80 group">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i data-lucide="search" class="h-4 w-4 text-slate-400 group-focus-within:text-amber-600 transition-colors duration-200"></i>
                    </span>
                    <input type="text" id="searchInput" placeholder="Cari berkas di semua folder..." class="block w-full pl-11 pr-4 py-2.5 border border-slate-200/80 rounded-2xl leading-5 bg-slate-50/50 placeholder-slate-400 focus:outline-none focus:bg-white focus:ring-4 focus:ring-amber-500/10 focus:border-amber-500 transition-all duration-200 shadow-inner text-sm font-medium text-slate-700">
                </div>
                <button onclick="logoutPortal()" class="p-2.5 bg-slate-100 hover:bg-rose-50 border border-slate-200/60 hover:border-rose-200 text-slate-500 hover:text-rose-600 rounded-2xl transition shadow-sm flex items-center justify-center group" title="Keluar Portal">
                    <i data-lucide="log-out" class="w-5 h-5 group-hover:translate-x-0.5 transition-transform"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-10">
        <div class="flex items-center flex-wrap gap-2 text-sm text-slate-600 mb-8 bg-white/80 backdrop-blur-md p-4 rounded-2xl border border-slate-200/40 shadow-sm" id="breadcrumbs"></div>

        <!-- Container Khusus untuk Dashboard -->
        <div id="customDashboard" class="hidden mb-8 w-full animate-[fadeIn_0.5s_ease-out]"></div>

        <div id="portalGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div class="skeleton h-64 rounded-3xl"></div>
            <div class="skeleton h-64 rounded-3xl"></div>
            <div class="skeleton h-64 rounded-3xl"></div>
            <div class="skeleton h-64 rounded-3xl"></div>
        </div>

        <div id="noResults" class="hidden text-center py-20 bg-white/80 backdrop-blur-md rounded-3xl border border-slate-200/50 shadow-sm mt-4">
            <div class="bg-slate-100/80 p-4 rounded-2xl w-16 h-16 flex items-center justify-center mx-auto mb-4 border border-slate-200/30">
                <i data-lucide="folder-search" class="w-8 h-8 text-slate-400"></i>
            </div>
            <h3 class="text-base font-bold text-slate-700">Tidak ada folder atau berkas</h3>
            <p class="mt-1 text-sm text-slate-400 font-medium">Coba periksa kata kunci pencarian Anda kembali atau hak akses akun Anda.</p>
        </div>
    </main>

    <script>
        const API_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSLSxNv5RprtBuF1wZEylbpaO0hVA3M67_9-zdIrv5pX7lyKV1duYNfQKgcRIOD6_aATKTWjC3dSYyQ/pub?gid=119812050&single=true&output=csv';
        
        let allFiles = [];
        let accessibleFiles = []; 
        let currentPath = []; 

        // DATABASE USERNAME RESMI YANG BOLEH LOGIN
        const manualDatabase = [
            'admin', 'midnorth', 'candra', 'mrdiy',
            'jc2017', 'jc8001', 'jc2021', 'jc1029', 'jc1020', 'jc3001', 'jc2001', 'jc2008', 'jc5005', 'jc6003', 'jc2012', 'jc1014', 'jc2018', 'jc4006', 'jc8005', 'jc3003', 'jc1005', 'jc5002', 'jc1012', 'jc21002', 'jc5003', 'jc8006', 'jc2016', 'jc1027', 'jc8004', 'bm agus', 'bm didi', 'bm gali', 'abm an', 'abm ba', 'abm ika', 'abm ad', 'abm ri'
        ];

        function getIconByKategori(kategori) {
            const kat = (kategori || '').toUpperCase().trim();
            if (kat.includes('FORM') || kat.includes('LINK')) return { name: 'file-text', bg: 'bg-emerald-50 text-emerald-600 border-emerald-100/70', badge: 'from-emerald-500/10 to-teal-500/10 text-emerald-700 border-emerald-200/50' };
            if (kat.includes('PDF')) return { name: 'file-digit', bg: 'bg-rose-50 text-rose-600 border-rose-100/70', badge: 'from-rose-500/10 to-orange-500/10 text-rose-700 border-rose-200/50' };
            if (kat.includes('EXCEL') || kat.includes('SHEET') || kat.includes('XLS')) return { name: 'table-properties', bg: 'bg-green-50 text-green-600 border-green-100/70', badge: 'from-green-500/10 to-emerald-500/10 text-green-700 border-green-200/50' };
            if (kat.includes('IMAGE') || kat.includes('PNG') || kat.includes('JPG')) return { name: 'image', bg: 'bg-indigo-50 text-indigo-600 border-indigo-100/70', badge: 'from-indigo-500/10 to-purple-500/10 text-indigo-700 border-indigo-200/50' };
            if (kat.includes('ZIP') || kat.includes('RAR')) return { name: 'folder-archive', bg: 'bg-amber-50 text-amber-600 border-amber-100/70', badge: 'from-amber-500/10 to-yellow-500/10 text-amber-700 border-amber-200/50' };
            
            return { name: 'file', bg: 'bg-slate-50 text-slate-600 border-slate-200/70', badge: 'from-slate-500/10 to-slate-600/10 text-slate-700 border-slate-200' };
        }

        function parseCSV(text) {
            let lines = text.split('\n');
            let headers = lines[0].split(',').map(h => h.replace(/["\r]/g, "").trim());
            let result = [];
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i]) continue;
                let row = [];
                let inQuotes = false;
                let currentStr = "";
                for (let char of lines[i]) {
                    if (char === '"') { inQuotes = !inQuotes; } 
                    else if (char === ',' && !inQuotes) { row.push(currentStr.trim()); currentStr = ""; } 
                    else { currentStr += char; }
                }
                row.push(currentStr.trim());
                let obj = {};
                headers.forEach((header, index) => {
                    obj[header] = row[index] ? row[index].replace(/[\r"]/g, "") : "";
                });
                result.push(obj);
            }
            return result;
        }

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                const csvText = await response.text();
                allFiles = parseCSV(csvText);
                
                if (sessionStorage.getItem('portalLoggedIn') === 'true') {
                    filterAndRender();
                    bypassLogin();
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('portalGrid').innerHTML = '<p class="text-rose-500 text-center col-span-full font-bold">Gagal memuat data dari Publikasi CSV Web.</p>';
            }
        }

        function filterAndRender() {
            const loggedInUser = sessionStorage.getItem('portalUser') || '';
            
            accessibleFiles = allFiles.filter(file => {
                if (loggedInUser === 'admin') {
                    return true;
                }

                const fileTargetUser = file.Username ? file.Username.trim().toLowerCase() : '';
                
                if (fileTargetUser === '') {
                    return true;
                }

                if (fileTargetUser === 'abm') {
                    return loggedInUser.startsWith('abm') || loggedInUser.startsWith('bm');
                }

                return (fileTargetUser === loggedInUser);
            });

            renderPortal();
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const inputUser = document.getElementById('usernameInput').value.trim().toLowerCase();
            const errorText = document.getElementById('loginError');

            if (manualDatabase.includes(inputUser)) {
                errorText.classList.add('hidden');
                sessionStorage.setItem('portalLoggedIn', 'true');
                sessionStorage.setItem('portalUser', inputUser);
                
                filterAndRender();
                bypassLogin();
            } else {
                errorText.classList.remove('hidden');
            }
        });

        function bypassLogin() {
            const overlay = document.getElementById('loginOverlay');
            if (overlay) {
                overlay.classList.add('opacity-0', 'pointer-events-none');
                document.getElementById('mainBody').classList.remove('overflow-hidden');
                setTimeout(() => overlay.remove(), 500);
            }
        }

        function logoutPortal() {
            sessionStorage.removeItem('portalLoggedIn');
            sessionStorage.removeItem('portalUser');
            window.location.reload();
        }

        function renderPortal() {
            const grid = document.getElementById('portalGrid');
            const noResults = document.getElementById('noResults');
            const customDashboard = document.getElementById('customDashboard');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            renderBreadcrumbs();
            grid.innerHTML = '';

            if (customDashboard) {
                customDashboard.innerHTML = '';
                customDashboard.classList.add('hidden');
            }

            if (searchTerm) {
                const filtered = accessibleFiles.filter(f => 
                    (f.Nama && f.Nama.toLowerCase().includes(searchTerm)) || 
                    (f.Deskripsi && f.Deskripsi.toLowerCase().includes(searchTerm))
                );
                if(filtered.length === 0) { noResults.classList.remove('hidden'); return; }
                noResults.classList.add('hidden');
                renderFilesOnly(filtered, grid);
                lucide.createIcons();
                return;
            }

            const currentFolderStr = currentPath.join(' / ');

            if (currentFolderStr.toUpperCase() === 'UPT') {
                if (customDashboard) {
                    customDashboard.classList.remove('hidden');
                    customDashboard.innerHTML = `
                        <div class="bg-white/80 backdrop-blur-md rounded-3xl border border-slate-200/50 p-6 sm:p-8 shadow-sm">
                            <div class="flex items-center gap-3 mb-6">
                                <div class="bg-amber-100 text-amber-600 p-2.5 rounded-xl">
                                    <i data-lucide="bar-chart-2" class="w-5 h-5"></i>
                                </div>
                                <div>
                                    <h2 class="text-lg font-extrabold text-slate-800 leading-tight">Dashboard Performa UPT</h2>
                                    <p class="text-xs font-medium text-slate-400">Ringkasan Top 3 dan Bottom 3 bulan ini</p>
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="bg-gradient-to-br from-emerald-50 to-white rounded-2xl p-5 border border-emerald-100/70 shadow-sm relative overflow-hidden">
                                    <div class="absolute -right-4 -top-4 bg-emerald-500/10 w-24 h-24 rounded-full blur-2xl"></div>
                                    <h3 class="text-sm font-bold text-emerald-800 mb-4 flex items-center gap-2">
                                        <i data-lucide="trending-up" class="w-4 h-4 text-emerald-600"></i> Top 3 UPT
                                    </h3>
                                    <ul class="space-y-3">
                                        <li class="flex justify-between items-center bg-white p-3 rounded-xl border border-emerald-50 shadow-sm text-sm font-semibold text-slate-700">1. UPT Jakarta <span class="text-emerald-600 font-bold bg-emerald-100 px-2 py-1 rounded-md text-xs">98%</span></li>
                                        <li class="flex justify-between items-center bg-white p-3 rounded-xl border border-emerald-50 shadow-sm text-sm font-semibold text-slate-700">2. UPT Surabaya <span class="text-emerald-600 font-bold bg-emerald-100 px-2 py-1 rounded-md text-xs">95%</span></li>
                                        <li class="flex justify-between items-center bg-white p-3 rounded-xl border border-emerald-50 shadow-sm text-sm font-semibold text-slate-700">3. UPT Bandung <span class="text-emerald-600 font-bold bg-emerald-100 px-2 py-1 rounded-md text-xs">92%</span></li>
                                    </ul>
                                </div>
                                
                                <div class="bg-gradient-to-br from-rose-50 to-white rounded-2xl p-5 border border-rose-100/70 shadow-sm relative overflow-hidden">
                                    <div class="absolute -right-4 -top-4 bg-rose-500/10 w-24 h-24 rounded-full blur-2xl"></div>
                                    <h3 class="text-sm font-bold text-rose-800 mb-4 flex items-center gap-2">
                                        <i data-lucide="trending-down" class="w-4 h-4 text-rose-600"></i> Bottom 3 UPT
                                    </h3>
                                    <ul class="space-y-3">
                                        <li class="flex justify-between items-center bg-white p-3 rounded-xl border border-rose-50 shadow-sm text-sm font-semibold text-slate-700">1. UPT Medan <span class="text-rose-600 font-bold bg-rose-100 px-2 py-1 rounded-md text-xs">65%</span></li>
                                        <li class="flex justify-between items-center bg-white p-3 rounded-xl border border-rose-50 shadow-sm text-sm font-semibold text-slate-700">2. UPT Makassar <span class="text-rose-600 font-bold bg-rose-100 px-2 py-1 rounded-md text-xs">68%</span></li>
                                        <li class="flex justify-between items-center bg-white p-3 rounded-xl border border-rose-50 shadow-sm text-sm font-semibold text-slate-700">3. UPT Bali <span class="text-rose-600 font-bold bg-rose-100 px-2 py-1 rounded-md text-xs">70%</span></li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }

            let SubFolders = new Set();
            let filesInThisFolder = [];

            accessibleFiles.forEach(file => {
                const itemFolderStr = file.Folder ? file.Folder.trim() : '';
                if (currentPath.length === 0) {
                    if (!itemFolderStr) { filesInThisFolder.push(file); } 
                    else { SubFolders.add(itemFolderStr.split(' / ')[0]); }
                } else {
                    if (itemFolderStr === currentFolderStr) { filesInThisFolder.push(file); } 
                    else if (itemFolderStr.startsWith(currentFolderStr + ' / ')) {
                        let remainder = itemFolderStr.substring((currentFolderStr + ' / ').length);
                        SubFolders.add(remainder.split(' / ')[0]);
                    }
                }
            });

            if (SubFolders.size === 0 && filesInThisFolder.length === 0) { noResults.classList.remove('hidden'); return; }
            noResults.classList.add('hidden');

            SubFolders.forEach(folderName => {
                if(!folderName) return;
                grid.innerHTML += `
                    <div onclick="navigateToFolder('${folderName}')" class="bg-white rounded-3xl border border-slate-200/60 p-6 flex flex-col justify-center items-center text-center cursor-pointer shadow-[0_4px_20px_-4px_rgba(15,23,42,0.02)] hover:shadow-[0_20px_40px_-12px_rgba(245,158,11,0.06)] hover:border-amber-500/40 hover-lift aspect-[4/5] group relative overflow-hidden transition-all duration-300">
                        <div class="bg-amber-500/10 text-amber-600 p-6 rounded-3xl border border-amber-500/20 group-hover:bg-amber-500 group-hover:text-white group-hover:border-amber-500 transition-all duration-300 flex items-center justify-center shadow-inner my-auto">
                            <i data-lucide="folder" class="w-12 h-12 fill-current opacity-80"></i>
                        </div>
                        <div class="w-full mt-4">
                            <h3 class="font-extrabold text-slate-700 text-sm tracking-tight truncate group-hover:text-amber-600 transition-colors duration-200">${folderName}</h3>
                            <p class="text-slate-400 text-[10px] font-bold tracking-wider flex items-center justify-center gap-1 mt-1 uppercase"><i data-lucide="folder-open" class="w-3 h-3"></i> Directory</p>
                        </div>
                    </div>`;
            });

            renderFilesOnly(filesInThisFolder, grid);
            lucide.createIcons();
        }

        function renderFilesOnly(files, container) {
            files.forEach(file => {
                if(!file.Nama) return;
                const iconConf = getIconByKategori(file.Kategori);
                
                let neonGlow = 'from-amber-500/20 to-orange-600/5';
                if (iconConf.name.includes('text')) neonGlow = 'from-emerald-500/20 to-teal-600/5';
                if (iconConf.name.includes('digit')) neonGlow = 'from-rose-500/20 to-red-600/5';
                if (iconConf.name.includes('properties')) neonGlow = 'from-green-500/20 to-emerald-600/5';
                if (iconConf.name.includes('image')) neonGlow = 'from-indigo-500/20 to-purple-600/5';

                container.innerHTML += `
                    <div onclick="window.open('${file.Link || '#'}', '_blank')" 
                         class="bg-white/80 backdrop-blur-md rounded-3xl border border-slate-200/50 p-6 shadow-[0_4px_20px_-4px_rgba(15,23,42,0.02)] hover:shadow-[0_20px_40px_-12px_rgba(15,23,42,0.08)] hover:border-amber-500/30 hover-lift flex flex-col justify-between items-center text-center cursor-pointer group relative overflow-hidden aspect-[4/5] transition-all duration-300">
                        
                        <!-- ELEMEN FUTURISTIK: Ambient Glow Behind Icon -->
                        <div class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2 w-32 h-32 bg-gradient-to-br ${neonGlow} rounded-full blur-2xl opacity-40 group-hover:opacity-100 group-hover:scale-125 transition-all duration-500 pointer-events-none"></div>
                        <div class="absolute bottom-0 left-0 right-0 h-[3px] bg-gradient-to-r from-transparent via-amber-500/30 to-transparent translate-y-[3px] group-hover:translate-y-0 transition-transform duration-300 pointer-events-none"></div>
                        
                        <!-- Top Header: Kategori Badge -->
                        <div class="w-full flex justify-center mb-2">
                            <span class="px-3 py-1 bg-gradient-to-r ${iconConf.badge} border text-[10px] font-extrabold rounded-xl tracking-wider uppercase shadow-sm">
                                ${file.Kategori || 'Umum'}
                            </span>
                        </div>
                        
                        <!-- MAKSIMALISASI IKON: Ikon Besar Ditengah -->
                        <div class="my-auto flex flex-col items-center justify-center">
                            <div class="${iconConf.bg} p-6 rounded-3xl border shadow-[inset_0_4px_10px_rgba(0,0,0,0.02)] group-hover:scale-110 group-hover:rotate-3 transition-all duration-300 transform">
                                <i data-lucide="${iconConf.name}" class="w-12 h-12 stroke-[1.8]"></i>
                            </div>
                        </div>
                        
                        <!-- PENATAAN BARU: Nama File & Deskripsi Dibawah Ikon -->
                        <div class="w-full mt-4 z-10">
                            <h3 class="text-sm font-extrabold text-slate-800 leading-snug group-hover:text-amber-600 transition-colors duration-200 line-clamp-2 px-1" title="${file.Nama}">
                                ${file.Nama}
                            </h3>
                            <p class="text-slate-400 text-[11px] mt-1.5 line-clamp-2 h-8 leading-relaxed font-medium tracking-wide">
                                ${file.Deskripsi || 'Tidak ada deskripsi berkas.'}
                            </p>
                        </div>
                        
                        <!-- Indikator Interaksi Pojok Kanan Atas -->
                        <div class="absolute top-4 right-4 p-1.5 bg-slate-50 border border-slate-200/60 rounded-xl text-slate-400 group-hover:bg-amber-500 group-hover:text-white group-hover:border-amber-500 opacity-0 group-hover:opacity-100 scale-70 group-hover:scale-100 transition-all duration-300">
                            <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
                        </div>
                    </div>`;
            });
        }

        function renderBreadcrumbs() {
            const container = document.getElementById('breadcrumbs');
            let html = `
                <span class="cursor-pointer font-bold text-amber-600 hover:text-amber-700 flex items-center gap-1 transition" onclick="jumpToBreadcrumb(-1)">
                    <i data-lucide="home" class="w-3.5 h-3.5"></i> Home
                </span>`;
            currentPath.forEach((folder, index) => {
                html += ` 
                    <span class="text-slate-300 font-light flex items-center"><i data-lucide="chevron-right" class="w-3.5 h-3.5"></i></span> 
                    <span class="cursor-pointer text-slate-500 hover:text-slate-700 font-semibold ${index === currentPath.length - 1 ? 'font-extrabold text-slate-800' : ''}" onclick="jumpToBreadcrumb(${index})">${folder}</span>`;
            });
            container.innerHTML = html;
        }

        function navigateToFolder(name) { currentPath.push(name); renderPortal(); }
        function jumpToBreadcrumb(index) { currentPath = currentPath.slice(0, index + 1); renderPortal(); }

        document.getElementById('searchInput').addEventListener('input', renderPortal);
        fetchData();
    </script>
</body>
</html>
