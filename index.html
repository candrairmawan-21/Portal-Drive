<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Portal Directory with Folders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Header & Navigation -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
                    </svg>
                </div>
                <h1 class="text-xl font-bold text-gray-800 tracking-tight">Cloud <span class="text-blue-600">Archive</span></h1>
            </div>
            
            <!-- Search Bar -->
            <div class="relative w-full md:w-96">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center">
                    <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </span>
                <input type="text" id="searchInput" placeholder="Cari dokumen di semua folder..." class="block w-full pl-10 pr-3 py-2 border border-gray-200 rounded-xl leading-5 bg-gray-100 placeholder-gray-500 focus:outline-none focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-150">
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <!-- Breadcrumbs Navigation -->
        <div class="flex items-center flex-wrap gap-2 text-sm text-gray-600 mb-6 bg-white p-4 rounded-xl border border-gray-100 shadow-sm" id="breadcrumbs"></div>

        <!-- Grid Folder & Cards Container -->
        <div id="portalGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div class="skeleton h-48 rounded-2xl"></div>
            <div class="skeleton h-48 rounded-2xl"></div>
            <div class="skeleton h-48 rounded-2xl"></div>
            <div class="skeleton h-48 rounded-2xl"></div>
        </div>

        <!-- No Results -->
        <div id="noResults" class="hidden text-center py-20">
            <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 9.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <p class="mt-4 text-gray-500">Folder atau file tidak ditemukan.</p>
        </div>
    </main>

    <script>
        // KODE SUDAH DISINKRONKAN DENGAN BENAR
        const API_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSLSxNv5RprtBuF1wZEylbpaO0hVA3M67_9-zdIrv5pX7lyKV1duYNfQKgcRIOD6_aATKTWjC3dSYyQ/pub?gid=119812050&single=true&output=csv';
        
        let allFiles = [];
        let currentPath = []; 

        function parseCSV(text) {
            let lines = text.split('\n');
            let headers = lines[0].split(',').map(h => h.replace(/["\r]/g, "").trim());
            let result = [];
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i]) continue;
                let row = [];
                let inQuotes = false;
                let currentStr = "";
                for (let char of lines[i]) {
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        row.push(currentStr.trim());
                        currentStr = "";
                    } else {
                        currentStr += char;
                    }
                }
                row.push(currentStr.trim());
                let obj = {};
                headers.forEach((header, index) => {
                    obj[header] = row[index] ? row[index].replace(/[\r"]/g, "") : "";
                });
                result.push(obj);
            }
            return result;
        }

        async function fetchData() {
            try {
                // SEKARANG MEMANGGIL API_URL DENGAN BENAR
                const response = await fetch(API_URL);
                const csvText = await response.text();
                allFiles = parseCSV(csvText);
                renderPortal();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('portalGrid').innerHTML = '<p class="text-red-500 text-center col-span-full">Gagal memuat data dari Publikasi CSV Web.</p>';
            }
        }

        function renderPortal() {
            const grid = document.getElementById('portalGrid');
            const noResults = document.getElementById('noResults');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            renderBreadcrumbs();
            grid.innerHTML = '';

            if (searchTerm) {
                const filtered = allFiles.filter(f => 
                    (f.Nama && f.Nama.toLowerCase().includes(searchTerm)) || 
                    (f.Deskripsi && f.Deskripsi.toLowerCase().includes(searchTerm))
                );
                if(filtered.length === 0) { noResults.classList.remove('hidden'); return; }
                noResults.classList.add('hidden');
                renderFilesOnly(filtered, grid);
                return;
            }

            const currentFolderStr = currentPath.join(' / ');
            let SubFolders = new Set();
            let filesInThisFolder = [];

            allFiles.forEach(file => {
                const itemFolderStr = file.Folder ? file.Folder.trim() : '';
                if (currentPath.length === 0) {
                    if (!itemFolderStr) { filesInThisFolder.push(file); } 
                    else { SubFolders.add(itemFolderStr.split(' / ')[0]); }
                } else {
                    if (itemFolderStr === currentFolderStr) { filesInThisFolder.push(file); } 
                    else if (itemFolderStr.startsWith(currentFolderStr + ' / ')) {
                        let remainder = itemFolderStr.substring((currentFolderStr + ' / ').length);
                        SubFolders.add(remainder.split(' / ')[0]);
                    }
                }
            });

            if (SubFolders.size === 0 && filesInThisFolder.length === 0) { noResults.classList.remove('hidden'); return; }
            noResults.classList.add('hidden');

            SubFolders.forEach(folderName => {
                if(!folderName) return;
                grid.innerHTML += `
                    <div onclick="navigateToFolder('${folderName}')" class="bg-white rounded-2xl border border-gray-200 p-5 flex items-center gap-4 cursor-pointer hover:border-blue-500 hover:shadow-md transition group">
                        <div class="bg-yellow-100 text-yellow-600 p-3 rounded-xl group-hover:bg-blue-50 group-hover:text-blue-600 transition">
                            <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg>
                        </div>
                        <div class="overflow-hidden">
                            <h3 class="font-bold text-gray-800 text-base truncate group-hover:text-blue-600 transition">${folderName}</h3>
                            <p class="text-gray-400 text-xs">Folder</p>
                        </div>
                    </div>`;
            });

            renderFilesOnly(filesInThisFolder, grid);
        }

        function renderFilesOnly(files, container) {
            files.forEach(file => {
                if(!file.Nama) return;
                container.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 hover:shadow-lg transition flex flex-col justify-between group">
                        <div>
                            <span class="px-2.5 py-0.5 bg-blue-50 text-blue-600 text-xs font-semibold rounded-full uppercase">${file.Kategori || 'Umum'}</span>
                            <h3 class="text-base font-bold text-gray-800 my-2 group-hover:text-blue-600 transition-colors">${file.Nama}</h3>
                            <p class="text-gray-500 text-xs line-clamp-2 mb-4">${file.Deskripsi || '-'}</p>
                        </div>
                        <a href="${file.Link || '#'}" target="_blank" class="inline-flex justify-center items-center px-4 py-2.5 bg-gray-900 text-white text-xs font-semibold rounded-xl hover:bg-blue-600 transition gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            Buka Link
                        </a>
                    </div>`;
            });
        }

        function renderBreadcrumbs() {
            const container = document.getElementById('breadcrumbs');
            let html = `<span class="cursor-pointer font-semibold text-blue-600 hover:underline" onclick="jumpToBreadcrumb(-1)">Home</span>`;
            currentPath.forEach((folder, index) => {
                html += ` <span class="text-gray-400">/</span> <span class="cursor-pointer text-gray-700 hover:underline ${index === currentPath.length - 1 ? 'font-bold text-gray-900' : ''}" onclick="jumpToBreadcrumb(${index})">${folder}</span>`;
            });
            container.innerHTML = html;
        }

        function navigateToFolder(name) { currentPath.push(name); renderPortal(); }
        function jumpToBreadcrumb(index) { currentPath = currentPath.slice(0, index + 1); renderPortal(); }

        document.getElementById('searchInput').addEventListener('input', renderPortal);
        fetchData();
    </script>
</body>
</html>
