<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Portal Directory</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Header & Navigation -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                </div>
                <h1 class="text-xl font-bold text-gray-800 tracking-tight">Cloud<span class="text-blue-600">Archive</span></h1>
            </div>
            
            <!-- Search Bar -->
            <div class="relative w-full md:w-96">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center">
                    <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </span>
                <input type="text" id="searchInput" placeholder="Cari dokumen atau file..." 
                    class="block w-full pl-10 pr-3 py-2 border border-gray-200 rounded-xl leading-5 bg-gray-100 placeholder-gray-500 focus:outline-none focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-150">
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <!-- Filter Kategori -->
        <div class="flex flex-wrap gap-2 mb-8 justify-center" id="categoryFilters">
            <button onclick="filterByCategory('All')" class="category-btn px-4 py-2 rounded-full text-sm font-medium bg-blue-600 text-white transition">Semua</button>
            <!-- Kategori akan muncul otomatis di sini -->
        </div>

        <!-- Grid Cards Container -->
        <div id="fileGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Loading State -->
            <div class="skeleton h-64 rounded-2xl"></div>
            <div class="skeleton h-64 rounded-2xl"></div>
            <div class="skeleton h-64 rounded-2xl"></div>
            <div class="skeleton h-64 rounded-2xl"></div>
        </div>

        <!-- No Results -->
        <div id="noResults" class="hidden text-center py-20">
            <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 9.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <p class="mt-4 text-gray-500">File tidak ditemukan. Coba kata kunci lain.</p>
        </div>
    </main>

    <script>
        // GANTI URL INI DENGAN URL WEB APP ANDA
        const API_URL = 'https://script.google.com/a/macros/mrdiy.com/s/AKfycbxPEXApM4hmFoPyBF1xFC2exvZ_Zx4twc7-CelXxjo6v3pwGDN3VYmklo53rwI91mGYYw/exec';
        
        let allData = [];
        let currentFilter = 'All';

        // Ambil data dari Google Sheets
        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                allData = await response.json();
                renderCategories();
                renderFiles(allData);
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('fileGrid').innerHTML = '<p class="text-red-500 text-center col-span-full">Gagal memuat data. Pastikan URL API benar dan sudah di-deploy sebagai "Anyone".</p>';
            }
        }

        // Tampilkan tombol kategori secara dinamis
        function renderCategories() {
            const categories = ['All', ...new Set(allData.map(item => item.Kategori))];
            const filterContainer = document.getElementById('categoryFilters');
            filterContainer.innerHTML = categories.map(cat => `
                <button onclick="filterByCategory('${cat}')" 
                    class="category-btn px-5 py-2 rounded-full text-sm font-medium transition duration-200 
                    ${currentFilter === cat ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-gray-600 hover:bg-gray-100 border border-gray-200'}">
                    ${cat === 'All' ? 'Semua' : cat}
                </button>
            `).join('');
        }

        // Render Card File
        function renderFiles(data) {
            const grid = document.getElementById('fileGrid');
            const noResults = document.getElementById('noResults');
            
            if (data.length === 0) {
                grid.classList.add('hidden');
                noResults.classList.remove('hidden');
                return;
            }

            grid.classList.remove('hidden');
            noResults.classList.add('hidden');

            grid.innerHTML = data.map(file => `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 hover:shadow-xl transition-shadow duration-300 flex flex-col justify-between group">
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <span class="px-3 py-1 bg-blue-50 text-blue-600 text-xs font-semibold rounded-full uppercase tracking-wide">
                                ${file.Kategori}
                            </span>
                        </div>
                        <h3 class="text-lg font-bold text-gray-800 mb-2 group-hover:text-blue-600 transition-colors">${file.Nama}</h3>
                        <p class="text-gray-500 text-sm line-clamp-3 mb-6">${file.Deskripsi}</p>
                    </div>
                    <a href="${file.Link}" target="_blank" 
                        class="inline-flex justify-center items-center px-4 py-3 bg-gray-900 text-white text-sm font-semibold rounded-xl hover:bg-blue-600 transition-colors duration-200 gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        Download File
                    </a>
                </div>
            `).join('');
        }

        // Fungsi Filter Kategori
        function filterByCategory(category) {
            currentFilter = category;
            renderCategories();
            handleSearch(); // Jalankan search lagi agar filter & search sinkron
        }

        // Fungsi Pencarian
        function handleSearch() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            const filteredData = allData.filter(item => {
                const matchesSearch = item.Nama.toLowerCase().includes(searchTerm) || 
                                    item.Deskripsi.toLowerCase().includes(searchTerm);
                const matchesCategory = currentFilter === 'All' || item.Kategori === currentFilter;
                
                return matchesSearch && matchesCategory;
            });
            
            renderFiles(filteredData);
        }

        // Event Listener Search
        document.getElementById('searchInput').addEventListener('input', handleSearch);

        // Mulai Ambil Data saat halaman dimuat
        fetchData();
    </script>
</body>
</html>
