<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnorth Portal - Sales Target Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex overflow-x-hidden">

    <!-- SIDEBAR -->
    <aside id="sidebarMenu" class="w-64 bg-slate-900 h-screen fixed md:static -translate-x-full md:translate-x-0 border-r border-slate-800 z-40 p-4">
        <div class="flex items-center gap-3 mb-6">
            <img src="midnorth java (1).png" alt="Logo" class="h-10 w-auto bg-white rounded-lg p-1">
            <h1 class="text-sm font-black text-white">Midnorth Portal</h1>
        </div>
        <nav class="space-y-2">
            <button onclick="window.location.href='index.html'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 text-slate-400 font-bold text-sm">
                <i data-lucide="folder-open" class="w-4 h-4"></i> File Manager
            </button>
            <button onclick="window.location.href='index.html'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 text-slate-400 font-bold text-sm">
                <i data-lucide="bar-chart-3" class="w-4 h-4"></i> Performa UPT
            </button>
            <a href="sales.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-amber-500 text-white font-bold text-sm">
                <i data-lucide="trending-up" class="w-4 h-4"></i> Sales Dashboard
            </a>
        </nav>
        <div class="absolute bottom-4 left-4 right-4 border-t border-slate-800 pt-4">
            <button onclick="logoutPortal()" class="w-full flex items-center gap-3 px-4 py-3 text-rose-400 font-bold text-sm">
                <i data-lucide="log-out" class="w-4 h-4"></i> Keluar Portal
            </button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-screen overflow-y-auto">
        <header class="h-16 flex items-center justify-between px-6 border-b border-slate-800/60 sticky top-0 bg-slate-950/50 backdrop-blur-md">
            <div class="flex items-center gap-2">
                <span class="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
                <span class="text-xs font-semibold text-slate-400 uppercase">Live Connection</span>
            </div>
            <div id="user-profile-nav"></div>
        </header>

        <main class="p-6 space-y-6">
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                <h1 class="text-2xl font-black">Sales & Target Dashboard</h1>
                <select id="slicerBulanSales" class="mt-4 bg-slate-950 border border-slate-800 rounded-xl px-4 py-2 text-sm font-bold">
                    <option value="Jan">Januari</option><option value="Feb">Februari</option><option value="Mar">Maret</option>
                    <option value="Apr">April</option><option value="May">Mei</option><option value="Jun">Juni</option>
                    <option value="Jul" selected>Juli</option><option value="Aug">Agustus</option><option value="Sep">September</option>
                    <option value="Oct">Oktober</option><option value="Nov">November</option><option value="Dec">Desember</option>
                </select>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800"><p class="text-xs text-slate-500">TOTAL MTD SALES</p><h3 id="summary-total-sales" class="text-2xl font-black text-emerald-400">Rp 0</h3></div>
                <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800"><p class="text-xs text-slate-500">AVG ACHIEVEMENT</p><h3 id="summary-avg-ach" class="text-2xl font-black text-indigo-400">0%</h3></div>
            </div>
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800"><canvas id="salesTargetChart" class="h-80"></canvas></div>
            <div class="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-950/60 text-slate-500 text-[11px] uppercase"><tr><th class="px-5 py-4">Store</th><th class="px-5 py-4">Level</th><th class="px-5 py-4 text-right">Sales</th><th class="px-5 py-4 text-right">Target</th><th class="px-5 py-4 text-center">Ach %</th></tr></thead>
                    <tbody id="sales-table-body" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        function logoutPortal() { sessionStorage.clear(); window.location.href = 'index.html'; }
        document.addEventListener('DOMContentLoaded', () => { if (!sessionStorage.getItem('portalLoggedIn')) window.location.href = 'index.html'; });
    </script>
    <script src="sales-dashboard.js"></script>
</body>
</html>
