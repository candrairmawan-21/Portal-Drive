<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-950 text-slate-100">
    <div class="flex h-screen">
        <aside class="w-64 bg-slate-900 p-4 border-r border-slate-800">
            <h1 class="text-sm font-black mb-6 px-2">Midnorth Portal</h1>
            <nav class="space-y-2">
                <button onclick="window.location.href='index.html'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 text-slate-400 font-bold text-sm">File Manager</button>
                <button onclick="window.location.href='index.html'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 text-slate-400 font-bold text-sm">Performa UPT</button>
                <a href="sales.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-amber-500 text-white font-bold text-sm">Sales Dashboard</a>
            </nav>
        </aside>
        <main class="flex-1 p-6 overflow-y-auto">
            <div class="flex justify-between items-center bg-slate-900 p-6 rounded-2xl border border-slate-800 mb-6">
                <div>
                    <h1 class="text-2xl font-black">Sales Dashboard</h1>
                    <p id="update-date" class="text-xs text-amber-500 font-bold"></p>
                </div>
                <select id="slicerBulanSales" class="bg-slate-950 border border-slate-700 rounded-lg px-4 py-2 text-sm font-bold">
                    <option value="Jul26" selected>Juli 2026</option><option value="Jun26">Juni 2026</option><option value="May26">Mei 2026</option>
                    <option value="Apr26">April 2026</option><option value="Mar26">Maret 2026</option><option value="Feb26">Februari 2026</option>
                    <option value="Jan26">Januari 2026</option><option value="Dec25">Desember 2025</option><option value="Nov25">November 2025</option>
                </select>
            </div>
            <div id="sales-loading" class="hidden text-amber-500 font-bold text-sm mb-4">Memuat...</div>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800"><p class="text-xs text-slate-500">SALES</p><h3 id="summary-total-sales" class="text-xl font-black text-emerald-400">Rp 0</h3></div>
                <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800"><p class="text-xs text-slate-500">ACHIEVEMENT</p><h3 id="summary-avg-ach" class="text-xl font-black text-indigo-400">0%</h3></div>
            </div>
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 h-80 mb-6"><canvas id="salesTargetChart"></canvas></div>
            <table class="w-full text-left bg-slate-900 rounded-2xl border border-slate-800"><tbody id="sales-table-body"></tbody></table>
        </main>
    </div>
    <script>
        function logoutPortal() { sessionStorage.clear(); window.location.href = 'index.html'; }
        // Cek login HANYA jika bukan di index.html agar tidak looping redirect
        if (!sessionStorage.getItem('portalLoggedIn') && window.location.href.indexOf('index.html') === -1) {
            window.location.href = 'index.html';
        }
    </script>
    <script src="sales-dashboard.js"></script>
</body>
</html>
